name: mari_rojmel_app
description: "Mari Rojmel - Smart Personal Expense Manager"
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.1.0

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  image_picker: ^1.2.0
  flutter_file_dialog: ^3.0.2
  file_picker: ^10.3.2

  # Local Storage
  shared_preferences: ^2.5.3

  # Date & Time
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#B71C1C"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  # fonts:
  #   - family: NotoSansGujarati
  #     fonts:
  #       - asset: assets/fonts/NotoSansGujarati-Regular.ttf
  #       - asset: assets/fonts/NotoSansGujarati-Bold.ttf
  #         weight: 700