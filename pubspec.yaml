name: mari_rojmel_app
description: "Mari Rojmel - Smart Personal Expense Manager"
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.1.0

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  path_provider: ^2.1.5

  # Local Storage
  shared_preferences: ^2.5.3

  # Date & Time
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

